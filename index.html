<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lokesh Bommagani — Software Engineer</title>
    <meta name="description" content="Lokesh Bommagani — Software Engineer specializing in Angular, Node.js, Kafka-based distributed systems, and real-time trading platforms." />
    <meta property="og:title" content="Lokesh Bommagani — Software Engineer" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        try {
          const savedTheme = window.localStorage.getItem('portfolio-theme');
          const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          const theme = savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : prefersLight
              ? 'light'
              : 'dark';

          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (_) {
          document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
